services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ridenow
      POSTGRES_PASSWORD: ridenow
      POSTGRES_DB: ridenow
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridenow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgres://ridenow:ridenow@db:5432/ridenow
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  rider-web:
    build:
      context: .
      dockerfile: apps/rider-web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - api

  driver-web:
    build:
      context: .
      dockerfile: apps/driver-web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3002:3002"
    depends_on:
      - api

volumes:
  db-data:
